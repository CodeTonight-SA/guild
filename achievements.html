<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | CodeTonight Guild</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .achievement {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }
        .achievement-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .achievement-name {
            color: var(--accent-warm);
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        .achievement-desc {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-family: var(--font-sans);
        }
        .achievement-date {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .back-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="terminal">
        <header class="terminal-header">
            <div class="terminal-dots">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <span class="terminal-title">codetonight@guild ~ $ cat achievements.md</span>
        </header>
        <main class="terminal-body">
            <a href="index.html" class="back-link">&larr; Back to profile</a>
            <h1 style="margin-bottom: 1.5rem; font-family: var(--font-sans);">Achievements</h1>
            <div id="achievements-list"></div>
        </main>
    </div>
    <script>
        fetch('data/achievements.json')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('achievements-list');
                data.achievements.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'achievement';
                    div.innerHTML = `
                        <div class="achievement-icon">${a.unlocked ? '\u2705' : '\u{1f512}'}</div>
                        <div>
                            <div class="achievement-name">${a.name}</div>
                            <div class="achievement-desc">${a.description}</div>
                            ${a.date ? `<div class="achievement-date">Unlocked: ${a.date}</div>` : ''}
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
    </script>
</body>
</html>
